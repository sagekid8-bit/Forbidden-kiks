<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<title>FORBIDDEN KIKS</title>
<style>
:root{--a:#ff4d7d;--b:#ff8a3d;--c:#8b5cf6;--d:#22d3ee;--e:#f59e0b;--muted:#c5bdd9}
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#fff;background:radial-gradient(circle at top,#2a1248 0,#0b0615 30%,#05010a 70%,#020104 100%);min-height:100vh;overflow-x:hidden}
header{position:sticky;top:0;padding:18px 14px 14px;background:rgba(5,1,10,.82);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);z-index:10}
.brand{text-align:center;margin:0;font-size:clamp(2rem,5vw,3.8rem);line-height:1;letter-spacing:3px;font-weight:900;background:linear-gradient(90deg,#ff4d7d 0%,#ff8a3d 18%,#f59e0b 34%,#22d3ee 50%,#8b5cf6 68%,#34d399 84%,#ffffff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 10px rgba(255,255,255,.18))}
.tagline{text-align:center;margin:10px 0 0;font-size:clamp(.9rem,2.2vw,1.15rem);letter-spacing:2px;text-transform:uppercase;color:#f2eefe}
.tagline span{display:inline-block;padding:7px 14px;border-radius:999px;background:linear-gradient(90deg,rgba(255,77,125,.18),rgba(139,92,246,.18),rgba(34,211,238,.18));border:1px solid rgba(255,255,255,.12)}
.top,.toolbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.search{flex:1;min-width:220px;max-width:760px;padding:14px 16px;border-radius:16px;border:1px solid #322c47;background:#151222;color:#fff;font-size:16px;outline:none}
.btn{border:0;border-radius:16px;padding:13px 18px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--a),var(--b));cursor:pointer}
.ghost{background:#1b1730;border:1px solid #342b52}
.small{padding:11px 16px;border-radius:14px}
.wrap{padding:0;max-width:100vw;margin:0 auto;overflow:hidden;touch-action:pan-y}
.slider{display:flex;transition:transform .28s ease;will-change:transform;width:100%}
.page{min-width:100%;padding:14px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.card{background:linear-gradient(180deg,rgba(24,19,38,.95),rgba(10,8,18,.98));border:1px solid rgba(255,255,255,.09);border-radius:22px;overflow:hidden}
.img{aspect-ratio:1/1;background:linear-gradient(135deg,rgba(255,77,125,.16),rgba(139,92,246,.16),rgba(34,211,238,.16));display:grid;place-items:center}
.img img{width:100%;height:100%;object-fit:cover}
.ph{color:#d6c7ff}
.pad{padding:12px}
.name{font-weight:900;font-size:1.02rem;margin-bottom:6px}
.meta{color:var(--muted);font-size:.92rem;line-height:1.35}
.price{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-weight:900}
.sale{color:#8bf1c4}
select,input[type=number],textarea,input[type=text]{width:100%;background:#141121;color:#fff;border:1px solid #342b52;border-radius:12px;padding:12px;font-size:15px;resize:vertical;min-height:44px}
.pager{display:flex;justify-content:center;align-items:center;color:#fff;margin:12px 0 20px;padding:0 14px 20px;text-align:center;font-family:'Playfair Display',serif;font-size:1rem;letter-spacing:.8px;text-shadow:0 0 18px rgba(255,215,120,.35)}
.pager span{background:linear-gradient(90deg,#ffffff 0%,#fff9e6 20%,#f6dc92 40%,#d4af37 62%,#ffffff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:20}
.panel{display:none;position:fixed;top:0;right:0;width:min(92vw,430px);height:100vh;background:#0d0a14;border-left:1px solid rgba(255,255,255,.1);overflow:auto;z-index:21}
.panel.open,.overlay.open{display:block}
.sheet h2{margin:0;padding:16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sheet .content{padding:16px}
.footerbar,.adminbar,.movebar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.muted{color:var(--muted)}
.hidden{display:none}
.bubblewrap{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.bubble{border:1px solid rgba(255,255,255,.14);background:#171326;color:#fff;border-radius:999px;padding:9px 12px;font-size:.88rem;cursor:pointer}
.bubble.active{background:linear-gradient(135deg,#ffffff,#d4af37);color:#120f18;border-color:#f3df9a}
.bubble.size{min-width:42px;text-align:center}
.adminproduct,.draftitem{background:#12101d;border:1px solid #2f2748;border-radius:16px;padding:10px;margin-top:10px}
@media (min-width:700px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media (min-width:1000px){.grid{grid-template-columns:repeat(4,minmax(0,1fr))}}
@media (max-width:520px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<header>
<h1 class="brand">FORBIDDEN KIKS</h1>
<p class="tagline"><span>Stay Flashy. Stay Rare.</span></p>
<div class="top"><input id="search" class="search" placeholder="Search shoes..."><button class="btn" id="adminBtn">Admin</button></div>
<div class="toolbar"><button class="btn ghost small" id="cartBtn">Cart <span id="cartCount">0</span></button><button class="btn ghost small" id="clearCartBtn">Clear Cart</button></div>
</header>
<main class="wrap" id="sliderWrap">
<div id="slider" class="slider">
<div class="page"><div id="grid" class="grid"></div></div>
</div>
<div class="pager"><span id="pageInfo">worry about delivery... Nah relax we got you</span></div>
</main>
<div id="overlay" class="overlay"></div>
<div id="cartPanel" class="panel"><div class="sheet"><h2>Cart</h2><div class="content"><div id="cartList"></div><div class="footerbar"><button class="btn ghost" id="clearCartBtn2">Clear</button><button class="btn" id="whatsAppBtn">WhatsApp</button></div></div></div></div>
<div id="adminPanel" class="panel"><div class="sheet"><h2>Admin</h2><div class="content"><div id="loginBox"><input id="pw" type="password" class="search" placeholder="Password"><div class="footerbar"><button class="btn" id="unlockBtn">Unlock</button><button class="btn ghost" id="closeAdminBtn">Close</button></div></div><div id="adminBox" class="hidden"><div class="adminbar"><button class="btn ghost small" id="loadBtn">Load Products</button><button class="btn ghost small" id="newDraftBtn">New Draft</button><button class="btn ghost small" id="addDraftBtn">Add to Draft</button><button class="btn ghost small" id="downloadBtn">Download products.json</button><button class="btn ghost small" id="clearDraftsBtn">Clear Drafts</button><button class="btn ghost small" id="lockBtn">Lock</button></div><div class="row2" style="margin-top:14px"><input id="aName" class="search edit-field" placeholder="Shoe name"><input id="aPrice" class="search edit-field" type="number" placeholder="Price"></div><input id="aSale" class="search edit-field" placeholder="Sale text"><input id="aImg" class="search edit-field" placeholder="Image URL"><textarea id="aDesc" rows="3" class="search edit-field" placeholder="Description"></textarea><div class="row2"><input id="aColors" class="search edit-field" placeholder="Colors comma separated"><input id="aSizes" class="search edit-field" placeholder="Sizes comma separated"></div><div class="footerbar"><button class="btn" id="saveDraftBtn">Save Changes</button><button class="btn ghost" id="updateDraftBtn">Update Draft</button><button class="btn ghost" id="clearFormBtn">Clear Form</button></div><div class="muted" id="draftState" style="margin-top:10px">Drafts: 0</div><div id="draftList" style="margin-top:14px"></div><div class="muted" style="margin-top:18px">All Products</div><div id="adminProducts"></div></div></div></div></div>
<script>
const PASS='031005';
const SOURCE='products.json';
const DRAFT_KEY='fk_draft_products';
const FORM_KEY='fk_admin_form';
const HIDDEN_KEY='fk_hidden_admin_products';
const DELETE_KEY='fk_deleted_products';
const SIZE_POOL=[1,2,3,4,5,6,7,8];
const COLOR_POOL=['Black','White','Gold','Silver','Red','Blue','Green','Yellow','Orange','Purple','Pink','Brown','Beige','Cream','Grey','Charcoal','Navy','Teal','Turquoise','Mint','Olive','Maroon','Burgundy','Coral','Peach','Lime','Cyan','Magenta','Rose Gold','Bronze','Copper','Lavender','Sky Blue','Mint Green','Cream White','Slate','Ivory'];
let cart=JSON.parse(localStorage.getItem('fk_cart')||'[]');
let draftProducts=JSON.parse(localStorage.getItem(DRAFT_KEY)||'[]');
let hiddenProducts=JSON.parse(localStorage.getItem(HIDDEN_KEY)||'[]');
let deletedProducts=JSON.parse(localStorage.getItem(DELETE_KEY)||'[]');
let products=[];
let adminProducts=[];
let logged=false,draftsVisible=true,editingDraft=-1,editingProductId=null,editingMode='new';
let swipeStartX=0,swiping=false,page=0;
const per=6,$=id=>document.getElementById(id);
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function saveCart(){save('fk_cart',cart)}
function saveDrafts(){save(DRAFT_KEY,draftProducts);renderDrafts()}
function saveHidden(){save(HIDDEN_KEY,hiddenProducts)}
function saveDeleted(){save(DELETE_KEY,deletedProducts)}
function keyOf(p){return String((p&&p.name)||'').trim().toLowerCase()+'||'+String((p&&p.img)||'').trim().toLowerCase()}
function currentDeletedSet(){return new Set(deletedProducts.map(x=>String(x).trim().toLowerCase()))}
function currentHiddenSet(){return new Set(hiddenProducts.map(x=>String(x).trim().toLowerCase()))}
function formData(){return {name:$('aName').value.trim(),price:$('aPrice').value,sale:$('aSale').value.trim(),img:$('aImg').value.trim(),desc:$('aDesc').value.trim(),colors:$('aColors').value,sizes:$('aSizes').value}}
function setForm(d){$('aName').value=d.name||'';$('aPrice').value=d.price||'';$('aSale').value=d.sale||'';$('aImg').value=d.img||'';$('aDesc').value=d.desc||'';$('aColors').value=Array.isArray(d.colors)?d.colors.join(', '):(d.colors||'');$('aSizes').value=Array.isArray(d.sizes)?d.sizes.join(', '):(d.sizes||'')}
function saveFormDraft(){save(FORM_KEY,formData())}
function loadFormDraft(){try{setForm(JSON.parse(localStorage.getItem(FORM_KEY)||'{}'))}catch(e){}}
function normalizeDraft(d){return {name:d.name||'New Shoe',price:parseFloat(d.price||0)||0,sale:d.sale||'',img:d.img||'',desc:d.desc||'',colors:(d.colors||'').split(',').map(s=>s.trim()).filter(Boolean),sizes:(d.sizes||'').split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n))}}
function visibleProducts(){const del=currentDeletedSet();return adminProducts.filter(p=>!del.has(keyOf(p)))}
function adminVisibleProducts(){const hid=currentHiddenSet();const del=currentDeletedSet();return adminProducts.filter(p=>!hid.has(keyOf(p))&&!del.has(keyOf(p)))}
function filtered(){const q=$('search').value.trim().toLowerCase();return visibleProducts().filter(p=>!q||[p.name,p.desc,(p.colors||[]).join(' '),(p.sizes||[]).join(' ')].join(' ').toLowerCase().includes(q))}
function clampPage(){const max=Math.max(0,Math.ceil(filtered().length/per)-1);page=Math.max(0,Math.min(page,max))}
function render(){clampPage();const list=filtered(),slice=list.slice(page*per,page*per+per);$('grid').innerHTML=slice.length?slice.map(p=>{const idx=visibleProducts().indexOf(p);return `<div class='card'><div class='img'>${p.img?`<img src='${p.img}' alt='${p.name} image' onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'ph\\'>Image failed</div>'">`:`<div class='ph'>No image</div>`}</div><div class='pad'><div class='name'>${p.name||''}</div><div class='meta'>${p.desc||''}</div><div class='price'><span>R${p.price||0}</span><span class='sale'>${p.sale||''}</span></div><div class='optline' style='margin-top:10px'><select id='c${idx}'>${(p.colors||[]).map(c=>`<option>${c}</option>`).join('')}</select><select id='s${idx}'>${(p.sizes||[]).map(s=>`<option>${s}</option>`).join('')}</select></div><div class='footerbar' style='display:flex;gap:10px;flex-wrap:wrap;margin-top:12px'><button class='btn small' onclick='addToCart(${idx})'>Add to cart</button></div></div></div>`;}).join(''):'<div class="muted">No products loaded yet.</div>';$('pageInfo').innerHTML=`<span>Worry about delivery... Nah relax we got you</span>`;$('cartCount').textContent=cart.reduce((a,b)=>a+b.qty,0);renderCart();renderDrafts();renderAdminProducts()}
function addToCart(i){const p=visibleProducts()[i],color=$('c'+i).value,size=$('s'+i).value,ex=cart.find(x=>x.i===i&&x.color===color&&x.size===size);if(ex)ex.qty++;else cart.push({i,name:p.name,price:Number(p.price)||0,color,size,img:p.img||'',qty:1});saveCart();render()}
function renderCart(){$('cartList').innerHTML=cart.length?cart.map((x,n)=>`<div class='item'><img src='${x.img||''}' onerror="this.style.display='none'"><div><div><b>${x.name}</b></div><div class='muted'>Color: ${x.color} • Size: ${x.size}</div><div class='muted'>R${x.price} x ${x.qty}</div></div><div class='qty'><button onclick='chg(${n},-1)'>-</button><span>${x.qty}</span><button onclick='chg(${n},1)'>+</button><button onclick='del(${n})'>x</button></div></div>`).join(''):'<div class="muted">Cart is empty.</div>'}
function chg(i,d){cart[i].qty+=d;if(cart[i].qty<1)cart.splice(i,1);saveCart();render()}
function del(i){cart.splice(i,1);saveCart();render()}
function clearCart(){cart=[];saveCart();render()}
function openCart(){$('overlay').classList.add('open');$('cartPanel').classList.add('open')}
function openAdmin(){$('overlay').classList.add('open');$('adminPanel').classList.add('open');$('pw').focus()}
function closePanels(){$('overlay').classList.remove('open');$('cartPanel').classList.remove('open');$('adminPanel').classList.remove('open')}
function login(){if($('pw').value===PASS){logged=true;$('loginBox').classList.add('hidden');$('adminBox').classList.remove('hidden');loadFormDraft();loadAdminProducts();renderDrafts();renderAdminProducts()}else alert('Wrong password')}
function logout(){logged=false;$('loginBox').classList.remove('hidden');$('adminBox').classList.add('hidden');$('pw').value=''}
function clearForm(){setForm({name:'',price:'',sale:'',img:'',desc:'',colors:'',sizes:''});editingDraft=-1;editingProductId=null;editingMode='new';saveFormDraft()}
function editDraft(i){editingMode='draft';editingDraft=i;editingProductId=null;setForm(draftProducts[i]);saveFormDraft()}
function removeDraft(i){if(confirm('Remove this draft?')){draftProducts.splice(i,1);if(editingDraft===i){editingDraft=-1;editingMode='new';editingProductId=null}else if(editingDraft>i)editingDraft--;saveDrafts();saveFormDraft()}}
function clearDrafts(){if(confirm('Clear all drafts?')){draftProducts=[];editingDraft=-1;editingMode='new';editingProductId=null;saveDrafts();clearForm()}}
function draftKey(d){return String((d&&d.name)||'').trim().toLowerCase()+'||'+String((d&&d.img)||'').trim().toLowerCase()}
function renderDrafts(){$('draftState').textContent='Drafts: '+draftProducts.length+(editingMode==='draft'&&editingDraft>=0?` | Editing Draft #${editingDraft+1}`:editingMode==='product'&&editingProductId!==null?` | Editing Product #${editingProductId+1}`:'');if(!logged){$('draftList').innerHTML='';return}$('draftList').innerHTML=draftProducts.length?draftProducts.map((p,i)=>`<div class='draftitem'><div class='drafthead'><div><b>${p.name}</b><div class='draftmeta'>R${p.price} • ${p.sale||''}</div></div><div class='footerbar' style='margin-top:0'><button class='btn ghost small' onclick='editDraft(${i})'>Edit</button><button class='btn ghost small' onclick='removeDraft(${i})'>Remove</button></div></div></div>`).join(''):'<div class="muted">No drafts yet.</div>'}
async function loadAdminProducts(){const res=await fetch(SOURCE);const data=await res.json();const source=Array.isArray(data.products)?data.products:(Array.isArray(data)?data:[]);const del=currentDeletedSet();adminProducts=source.filter(p=>!del.has(keyOf(p)));products=adminProducts.slice();render()}
function findProductByKey(key){return adminProducts.findIndex(p=>keyOf(p)===key)}
function editProductByKey(key){const i=findProductByKey(key);if(i<0)return;editingMode='product';editingDraft=-1;editingProductId=i;setForm(adminProducts[i]);saveFormDraft()}
function saveProductByKey(key){const i=findProductByKey(key);if(i<0)return;const d=normalizeDraft(formData());if(!d.colors.length)d.colors=['Black','White'];if(!d.sizes.length)d.sizes=[1,2,3,4,5,6,7,8];adminProducts[i]=d;products=adminProducts.slice();saveFormDraft();render()}
function removeFromAdminByKey(key){hiddenProducts=[...new Set([...hiddenProducts,key])];saveHidden();render()}
function deleteProductByKey(key){if(!confirm('Delete this product everywhere?'))return;deletedProducts=[...new Set([...deletedProducts,key])];hiddenProducts=hiddenProducts.filter(x=>x!==key);saveDeleted();saveHidden();adminProducts=adminProducts.filter(p=>keyOf(p)!==key);products=adminProducts.slice();render()}
function updateProductFromInputs(input){const key=input.dataset.key,kind=input.dataset.kind;const i=findProductByKey(key);if(i<0)return;const raw=input.value;let next=adminProducts[i];if(kind==='price')next={...next,price:Number(raw)||0};else if(kind==='colors')next={...next,colors:raw.split(',').map(s=>s.trim()).filter(Boolean)};else if(kind==='sizes')next={...next,sizes:raw.split(',').map(s=>Number(s.trim())).filter(n=>!Number.isNaN(n))};else next={...next,[kind]:raw};adminProducts[i]=next;products=adminProducts.slice();saveFormDraft()}
function attachEditFieldHandlers(){document.querySelectorAll('.edit-field').forEach(el=>{if(el.dataset.bound==='1')return;el.dataset.bound='1';el.addEventListener('focus',()=>{if(el.dataset.key){editingMode='product';editingDraft=-1;editingProductId=findProductByKey(el.dataset.key)}});el.addEventListener('input',()=>{saveFormDraft();updateProductFromInputs(el)})})}
function renderAdminProducts(){const box=$('adminProducts');if(!box)return;const vis=adminVisibleProducts();box.innerHTML=logged?vis.map((p,i)=>{const k=keyOf(p);return `<div class='adminproduct'><div class='drafthead'><div><b>${p.name}</b><div class='draftmeta'>Edit product details below</div></div></div><input class='search edit-field' data-kind='name' data-key='${k}' style='margin-top:10px' value='${p.name||''}' placeholder='Name'><input class='search edit-field' data-kind='price' data-key='${k}' style='margin-top:10px' type='number' value='${p.price ?? ''}' placeholder='Price'><input class='search edit-field' data-kind='sale' data-key='${k}' style='margin-top:10px' value='${p.sale || ''}' placeholder='Sale'><input class='search edit-field' data-kind='img' data-key='${k}' style='margin-top:10px' value='${p.img || ''}' placeholder='Image URL'><input class='search edit-field' data-kind='desc' data-key='${k}' style='margin-top:10px' value='${p.desc || ''}' placeholder='Description'><input class='search edit-field' data-kind='colors' data-key='${k}' style='margin-top:10px' value='${(p.colors || []).join(', ')}' placeholder='Colors comma separated'><input class='search edit-field' data-kind='sizes' data-key='${k}' style='margin-top:10px' value='${(p.sizes || []).join(', ')}' placeholder='Sizes comma separated'><div class='footerbar'><button class='btn ghost small' onclick='removeFromAdminByKey("${k}")'>Remove</button><button class='btn ghost small' onclick='editProductByKey("${k}")'>Edit</button><button class='btn ghost small' onclick='saveProductByKey("${k}")'>Save</button><button class='btn ghost small' onclick='deleteProductByKey("${k}")'>Delete</button></div></div>`}).join(''):'') 
attachEditFieldHandlers()}
function goWhatsApp(){if(!cart.length){alert('Cart is empty');return}const text='FORBIDDEN KIKS Order:%0A'+cart.map(x=>`- ${x.name} | Color: ${x.color} | Size: ${x.size} | Qty: ${x.qty} | R${x.price*x.qty}`).join('%0A')+'%0ATotal: R'+cart.reduce((a,b)=>a+b.price*b.qty,0);window.open(`https://wa.me/27686598721?text=${encodeURIComponent(text)}`,'_blank')}
function draftMerge(){const d=normalizeDraft(formData());if(!d.colors.length)d.colors=['Black','White'];if(!d.sizes.length)d.sizes=[1,2,3,4,5,6,7,8];return d}
function addDraft(){if(!logged){alert('Unlock admin first');return}const d=draftMerge();if(editingMode==='draft'&&editingDraft>=0&&draftProducts[editingDraft]){draftProducts[editingDraft]=d;saveDrafts();saveFormDraft();alert('Draft updated');return}if(editingMode==='product'&&editingProductId!==null&&adminProducts[editingProductId]){adminProducts[editingProductId]=d;products=adminProducts.slice();saveFormDraft();render();alert('Product updated');return}draftProducts.push(d);editingMode='draft';editingDraft=draftProducts.length-1;saveDrafts();saveFormDraft();alert('Draft added')}
function saveDraftEdit(){addDraft()}
$('sliderWrap').addEventListener('touchstart',e=>{swipeStartX=e.touches[0].clientX;swiping=true},{passive:true});
$('sliderWrap').addEventListener('touchend',e=>{if(!swiping)return;const dx=e.changedTouches[0].clientX-swipeStartX;if(Math.abs(dx)>50){if(dx<0){page++;render()}else{page--;render()}}swiping=false},{passive:true});
['aName','aPrice','aSale','aImg','aDesc','aColors','aSizes'].forEach(id=>$(id).addEventListener('input',saveFormDraft));
$('search').addEventListener('input',()=>{page=0;render()});
$('adminBtn').onclick=openAdmin;
$('cartBtn').onclick=openCart;
$('clearCartBtn').onclick=clearCart;
$('clearCartBtn2').onclick=clearCart;
$('whatsAppBtn').onclick=goWhatsApp;
$('unlockBtn').onclick=login;
$('closeAdminBtn').onclick=closePanels;
$('loadBtn').onclick=()=>{loadAdminProducts();render()};
$('newDraftBtn').onclick=()=>{clearForm();editingMode='new'};
$('addDraftBtn').onclick=addDraft;
$('saveDraftBtn').onclick=addDraft;
$('updateDraftBtn').onclick=saveDraftEdit;
$('downloadBtn').onclick=async()=>{const res=await fetch(SOURCE);const data=await res.json();const base=Array.isArray(data.products)?data.products:(Array.isArray(data)?data:[]);const del=currentDeletedSet();const merged=[...base.filter(p=>!del.has(keyOf(p)))];for(const item of draftProducts){const idx=merged.findIndex(p=>p.name===item.name);if(idx!==-1)merged[idx]={...merged[idx],...item};else merged.push(item)}const out=Array.isArray(data.products)||!Array.isArray(data)?{...data,products:merged}:merged;downloadJSON(out)};
$('clearDraftsBtn').onclick=clearDrafts;
$('lockBtn').onclick=logout;
$('clearFormBtn').onclick=clearForm;
$('overlay').onclick=closePanels;
function downloadJSON(data){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='products.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function removeDraftsIfDeleted(){const del=currentDeletedSet();draftProducts=draftProducts.filter(d=>!del.has(draftKey(d)))}
fetch(SOURCE).then(r=>r.json()).then(data=>{const source=Array.isArray(data.products)?data.products:(Array.isArray(data)?data:[]);const del=currentDeletedSet();adminProducts=source.filter(p=>!del.has(keyOf(p)));products=adminProducts.slice();removeDraftsIfDeleted();saveDrafts();render()}).catch(()=>{products=[];adminProducts=[];render()});
