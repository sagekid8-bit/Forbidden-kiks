<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FORBIDDEN STORE - Admin</title>
<style>
:root{--a:#ff4d7d;--b:#ff8a3d;--c:#8b5cf6;--d:#22d3ee;--e:#f59e0b;--muted:#c5bdd9;--bg:#07050c;--bg2:#0f0b18;--card:#14101f;--line:rgba(255,255,255,.09);--green:#8bf1c4;--text:#fff;--shadow:0 16px 40px rgba(0,0,0,.35)}
*{box-sizing:border-box} html,body{margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text);background:radial-gradient(circle at top,#2a1248 0,#0b0615 34%,#05010a 72%,#020104 100%);min-height:100%}
button,input,select,textarea{font:inherit}
header{position:sticky;top:0;z-index:20;background:rgba(5,1,10,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar{max-width:1400px;margin:0 auto;padding:12px}
.brand{margin:0;font-size:2rem;font-weight:900}
.wrap{max-width:1400px;margin:0 auto;padding:12px}
.panelbox{background:#14101f;border:1px solid var(--line);border-radius:16px;padding:12px}
.btn{border:0;border-radius:14px;padding:12px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--a),var(--b))}
.btn2{background:#1b1730;border:1px solid #372d57}
.hidden{display:none}
.card{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:10px}
</style>
</head>
<body><header>
  <div class="topbar">
    <h1 class="brand">FORBIDDEN STORE</h1>
  </div>
</header><div class="wrap">
<div class="panelbox"><div class="footerbar">
  <button class="btn" onclick="saveCurrent()">Save Product</button>
  <button class="btn btn2" onclick="downloadMergedJSON()">Download JSON</button>
  <button class="btn btn2" onclick="loadHiddenProducts()">Load Hidden Products</button>
  <button class="btn btn2" onclick="loadHiddenDrafts()">Load Hidden Drafts</button>
</div><h3>Products</h3>
<div id="productCards"></div><h3>Drafts</h3>
<div id="draftList"></div></div>
</div><script>
const PRODUCT_KEY='fk_all_products_v2';
const DRAFT_KEY='fk_draft_products';
const HIDDEN_PRODUCTS_KEY='fk_hidden_admin_products';
const HIDDEN_DRAFTS_KEY='fk_hidden_admin_drafts';

let allProducts = JSON.parse(localStorage.getItem(PRODUCT_KEY)||'[]');
let draftProducts = JSON.parse(localStorage.getItem(DRAFT_KEY)||'[]');
let hiddenAdminProducts = new Set(JSON.parse(localStorage.getItem(HIDDEN_PRODUCTS_KEY)||'[]'));
let hiddenAdminDrafts = new Set(JSON.parse(localStorage.getItem(HIDDEN_DRAFTS_KEY)||'[]'));

function persistAll(){localStorage.setItem(PRODUCT_KEY,JSON.stringify(allProducts));}
function persistDrafts(){localStorage.setItem(DRAFT_KEY,JSON.stringify(draftProducts));}
function persistHidden(){
  localStorage.setItem(HIDDEN_PRODUCTS_KEY,JSON.stringify([...hiddenAdminProducts]));
  localStorage.setItem(HIDDEN_DRAFTS_KEY,JSON.stringify([...hiddenAdminDrafts]));
}

// ===== DELETE FIXES =====
function removeProduct(id){
  if(!confirm('Delete ONLY this product?')) return;
  allProducts = allProducts.filter(p=>String(p.id)!==String(id));
  hiddenAdminProducts.delete(String(id));
  persistAll();
  persistHidden();
  renderProducts();
}

function removeDraft(id){
  if(!confirm('Delete ONLY this draft?')) return;
  draftProducts = draftProducts.filter(p=>String(p.id)!==String(id));
  hiddenAdminDrafts.delete(String(id));
  persistDrafts();
  persistHidden();
  renderDrafts();
}

// ===== SAVE / EDIT FIX =====
function saveCurrent(){
  const p={id:'p_'+Date.now(),name:'New Product',price:100};
  const idx = allProducts.findIndex(x=>String(x.id)===String(p.id));
  if(idx!==-1){
    allProducts[idx]=p;
  }else{
    allProducts.push(p);
  }
  persistAll();
  renderProducts();
}

// ===== HIDE / LOAD =====
function hideAdminProduct(id){hiddenAdminProducts.add(String(id));persistHidden();renderProducts();}
function hideDraft(id){hiddenAdminDrafts.add(String(id));persistHidden();renderDrafts();}
function loadHiddenProducts(){hiddenAdminProducts.clear();persistHidden();renderProducts();}
function loadHiddenDrafts(){hiddenAdminDrafts.clear();persistHidden();renderDrafts();}

// ===== DOWNLOAD FIX =====
function downloadMergedJSON(){
  const clean=[...new Map(allProducts.map(p=>[p.id,p])).values()];
  const blob=new Blob([JSON.stringify({products:clean},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='products.json';
  a.click();
}

// ===== RENDER =====
function renderProducts(){
  const el=document.getElementById('productCards');
  el.innerHTML = allProducts
  .filter(p=>!hiddenAdminProducts.has(String(p.id)))
  .map(p=>`<div class="card">
    <b>${p.name}</b> - $${p.price}<br>
    <button onclick="removeProduct('${p.id}')">Delete</button>
    <button onclick="hideAdminProduct('${p.id}')">Hide</button>
  </div>`).join('');
}

function renderDrafts(){
  const el=document.getElementById('draftList');
  el.innerHTML = draftProducts
  .filter(p=>!hiddenAdminDrafts.has(String(p.id)))
  .map(p=>`<div class="card">
    <b>${p.name}</b><br>
    <button onclick="removeDraft('${p.id}')">Delete Draft</button>
    <button onclick="hideDraft('${p.id}')">Hide</button>
  </div>`).join('');
}

renderProducts();
renderDrafts();
</script></body>
</html>
